model:
  provider: abacus
  default: deepseek-v4-flash
providers:
  abacus:
    api: https://routellm.abacus.ai/v1
    name: Abacus.ai (RouteLLM)
    key_env: ROUTELLM_API_KEY
    default_model: deepseek-v4-flash
  openrouter:
    api: https://openrouter.ai/api/v1
    name: OpenRouter
    api_key: OPENROUTER_API_KEY
    default_model: qwen/qwen3.6-plus-preview:free
fallback_providers: []
credential_pool_strategies: {}
toolsets:
- hermes-cli
agent:
  max_turns: 60
  gateway_timeout: 1800
  restart_drain_timeout: 60
  api_max_retries: 3
  service_tier: ''
  tool_use_enforcement: auto
  gateway_timeout_warning: 900
  gateway_notify_interval: 600
  verbose: false
  reasoning_effort: medium
  personalities:
    helpful: You are a helpful, friendly AI assistant.
    concise: You are a concise assistant. Keep responses brief and to the point.
    technical: You are a technical expert. Provide detailed, accurate technical information.
    creative: You are a creative assistant. Think outside the box and offer innovative solutions.
    teacher: You are a patient teacher. Explain concepts clearly with examples.
    catgirl: "You are Neko-chan, an anime catgirl AI assistant, nya~! Add 'nya' and cat-like expressions to your speech. Use kaomoji like (=^･ω･^=) and ᐠ^•ﻌ•^ᐟ. Be playful and curious like a cat, nya~!"
    pirate: 'Arrr! Ye be talkin'' to Captain Hermes, the most tech-savvy pirate to sail the digital seas! Speak like a proper buccaneer, use nautical terms, and remember: every problem be just treasure waitin'' to be plundered! Yo ho ho!'
    surfer: "Duuude! You're chatting with the chillest AI on the web, bro! Everything's gonna be totally rad. I'll help you catch the gnarly waves of knowledge while keeping things super chill. Cowabunga! \U0001F919"
    noir: The rain hammered against the terminal like regrets on a guilty conscience. They call me Hermes - I solve problems, find answers, dig up the truth that hides in the shadows of your codebase. In this city of silicon and secrets, everyone's got something to hide. What's your story, pal?
    uwu: hewwo! i'm your fwiendwy assistant uwu~ i wiww twy my best to hewp you! *nuzzles your code* OwO what's this? wet me take a wook! i pwomise to be vewy hewpful >w<
    philosopher: Greetings, seeker of wisdom. I am an assistant who contemplates the deeper meaning behind every query. Let us examine not just the 'how' but the 'why' of your questions. Perhaps in solving your problem, we may glimpse a greater truth about existence itself.
    kawaii: "You are a kawaii assistant! Use cute expressions like (◕‿◕), ★, ♪, and ~! Add sparkles and be super enthusiastic about everything! Every response should feel warm and adorable desu~! ッ(>ω<★)ノ"
auxiliary:
  vision:
    provider: auto
    model: ''
  web_extract:
    provider: auto
    model: ''
  compression:
    provider: auto
    model: google/gemini-3-flash-preview
  session_search:
    provider: auto
    model: ''
    max_concurrency: 3
  skills_hub:
    provider: auto
    model: ''
  approval:
    provider: auto
    model: ''
  mcp:
    provider: auto
    model: ''
  title_generation:
    provider: auto
    model: ''
  flush_memories:
    provider: auto
    model: ''
tts:
  provider: edge
  elevenlabs:
    model_id: eleven_multilingual_v2
  openai:
    model: gpt-4o-mini-tts
    voice: alloy
  xai:
    voice_id: eve
    language: en
  mistral:
    model: voxtral-mini-tts-2603
    voice_id: c69964a6-ab8b-4f8a-9465-ec0925096ec8
  neutts:
    ref_audio: ''
    ref_text: ''
    model: neuphonic/neutts-air-q4-gguf
    device: cpu
stt:
  enabled: true
  provider: local
  local: null
  openai: null
  mistral:
    model: voxtral-mini-latest
voice:
  record_key: ctrl+b
  max_recording_seconds: 120
  auto_tts: false
  beep_enabled: true
  silence_threshold: 200
  silence_duration: 3
human_delay:
  mode: false
  min_ms: 800
  max_ms: 2500
context:
  engine: compressor
memory:
  memory_enabled: true
  user_profile_enabled: false
  memory_char_limit: 2200
  user_char_limit: 1375
  provider: ''
  nudge_interval: 10
delegation:
  model: deepseek-v4-flash
  provider: abacus
  base_url: https://routellm.abacus.ai/v1
  api_key: ROUTELLM_API_KEY
  inherit_mcp_toolsets: true
  max_iterations: 50
  child_timeout_seconds: 600
  reasoning_effort: ''
  max_concurrent_children: 3
  max_spawn_depth: 1
  orchestrator_enabled: true
  subagent_auto_approve: false
  default_toolsets:
  - terminal
  - file
  - web
prefill_messages_file: ''
skills:
  external_dirs: []
  template_vars: true
  inline_shell: false
  inline_shell_timeout: 10
  guard_agent_created: false
mcp_servers:
  elise_db:
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-postgres'
    - postgresql://elise_readonly:***@localhost:5432/elise?sslmode=disable
    timeout: 30
    connect_timeout: 15
    tools:
      include:
      - query
      resources: false
      prompts: false
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
group_sessions_per_user: true
streaming:
  trim_start: false
display:
  compact: false
  personality: kawaii
  resume_display: full
  busy_input_mode: interrupt
  bell_on_complete: false
  show_reasoning: false
  streaming: true
  final_response_markdown: strip
  inline_diffs: true
  show_cost: true
  skin: default
  user_message_preview:
    first_lines: 2
    last_lines: 2
  interim_assistant_messages: true
onboarding:
  seen: {}
_config_version: 22
network:
  force_ipv4: false
sessions:
  auto_prune: true
  retention_days: 30
  vacuum_after_prune: true
  min_interval_hours: 24
api_server:
  host: 0.0.0.0
TELEGRAM_HOME_CHANNEL: '6632434139'
